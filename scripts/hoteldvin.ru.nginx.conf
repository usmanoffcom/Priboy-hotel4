# Редирект www -> без www (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name www.hoteldvin.ru;
    return 301 https://hoteldvin.ru$request_uri;
}

# Редирект www -> без www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hoteldvin.ru;
    ssl_certificate /etc/letsencrypt/live/hoteldvin.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoteldvin.ru/privkey.pem;
    return 301 https://hoteldvin.ru$request_uri;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hoteldvin.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hoteldvin.ru;

    ssl_certificate /etc/letsencrypt/live/hoteldvin.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoteldvin.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/hoteldvin.ru-access.log;
    error_log /var/log/nginx/hoteldvin.ru-error.log;

    location / {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /robots.txt {
        alias /var/www/hoteldvin/public/robots.txt;
        access_log off;
    }

    location = /sitemap.xml {
        proxy_pass http://localhost:3010;
        access_log off;
    }

    location /_next/static {
        proxy_pass http://localhost:3010;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}
